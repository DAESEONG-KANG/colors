<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>색상표 만들기</title>
  <style>
    .palette-wrap {
      display: inline-block;
      padding: 16px;
      border: 1px solid #aaa;
      background-color: #f0f0f0;
      font-family: sans-serif;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(14, 24px);
      gap: 2px;
    }

    .palette-title {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: bold;
    }

    .color-cell {
      width: 24px;
      height: 24px;
      border: 1px solid #888;
      cursor: pointer;
      box-sizing: border-box;
    }

    .color-cell:hover {
      border: 2px solid #000;
    }

    .color-cell.selected {
      border: 2px solid #000;
      outline: 1px solid #fff;
    }

    .info-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
      padding: 10px;
      background-color: #fff;
      border: 1px solid #aaa;
    }

    .preview-box {
      width: 48px;
      height: 48px;
      border: 1px solid #888;
      background-color: #fff;
    }

    .color-values p {
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="palette-wrap">
    <p class="palette-title">색상 선택</p>
    <div class="palette-grid" id="paletteGrid"></div>

    <div class="info-wrap">
      <div class="preview-box" id="previewBox"></div>
      <div class="color-values">
        <p>HEX: <span id="hexValue">#ffffff</span></p>
        <p>RGB: <span id="rgbValue">rgb(255, 255, 255)</span></p>
      </div>
    </div>
  </div>

  <script>
    const colors = [
      '#000000', '#111111', '#444444', '#555555', '#888888', '#aaaaaa', '#cccccc', '#ffffff',
      '#ff0000', '#ff4444', '#ff8800', '#ffaa00', '#ffff00', '#aaff00',
      '#00ff00', '#00ffaa', '#00ffff', '#00aaff', '#0000ff', '#4400ff',
      '#8800ff', '#ff00ff', '#ff0088', '#ff0044',
      '#7f0000', '#7f2200', '#7f4400', '#7f6600', '#7f7f00', '#447f00',
      '#007f00', '#007f44', '#007f7f', '#00447f', '#00007f', '#22007f',
      '#44007f', '#7f007f', '#7f0044', '#7f0022',
      '#ffcccc', '#ffddcc', '#ffeebb', '#ffffcc', '#ddffcc', '#ccffdd',
      '#ccffff', '#ccddff', '#ccccff', '#ddccff', '#ffccff', '#ffccee',
      '#ff6666', '#ff9966', '#ffbb66', '#ffee66', '#aaff66', '#66ffaa',
      '#66ffff', '#66aaff', '#6666ff', '#aa66ff', '#ff66ff', '#ff66aa',
      '#cc0000', '#cc4400', '#cc8800', '#ccaa00', '#aacc00', '#00cc44',
      '#00ccaa', '#0088cc', '#0044cc', '#4400cc', '#8800cc', '#cc0088',
      '#660000', '#663300', '#666600', '#336600', '#006633', '#006666',
      '#003366', '#000066', '#330066', '#660066', '#660033', '#663333',
    ];

    const grid = document.getElementById('paletteGrid');

    colors.forEach(color => {
      const cell = document.createElement('div');
      cell.className = 'color-cell';
      cell.style.backgroundColor = color;
      cell.title = color;

      cell.addEventListener('click', () => {
        document.querySelectorAll('.color-cell').forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
        showColorInfo(color);
      });

      grid.appendChild(cell);
    });

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function showColorInfo(hex) {
      const { r, g, b } = hexToRgb(hex);
      document.getElementById('previewBox').style.backgroundColor = hex;
      document.getElementById('hexValue').textContent = hex.toUpperCase();
      document.getElementById('rgbValue').textContent = `rgb(${r}, ${g}, ${b})`;
    }
  </script>

</body>
</html>
